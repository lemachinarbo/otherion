version: "2"

linters:
  disable:
    # Wails-bound methods, OpenPGP/S/MIME helper APIs, and OAuth flow
    # callbacks look unused to the linter but are reachable via runtime
    # bindings or kept as deliberate API surface. Revisit once we have
    # explicit tagging for Wails-exported methods.
    - unused
  settings:
    staticcheck:
      # Keep the bug (SA*) and simplification (S*) checks v1 enforced,
      # but drop the quickfix (QF*) and stylecheck (ST*) categories that
      # golangci-lint v2 newly turns on by default. This keeps the v2
      # upgrade behavior-equivalent to v1 instead of surfacing a wall of
      # pre-existing style nits on unrelated PRs.
      checks:
        - all
        - -QF*
        - -ST*
    govet:
      # hostport is a govet analyzer v2 enables by default but v1 did
      # not. The IPv6 address-format findings it raises in the IMAP/SMTP
      # clients are pre-existing; tracked separately rather than fixed
      # here so this stays a CI-parity change.
      disable:
        - hostport
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # CardDAV interop carries deliberate workarounds for non-compliant
      # servers. Skip lint enforcement here so cleanup edits do not
      # regress those compatibility paths.
      - linters:
          - errcheck
          - ineffassign
          - staticcheck
        path: internal/carddav/
      - linters:
          - errcheck
        path: app/carddav.go
    paths:
      - third_party$
      - builtin$
      - examples$
      # Vendored Go sources shipped inside JS tooling (e.g. flatted) are
      # not ours to lint. v1 skipped node_modules by default; restore it.
      - frontend/node_modules

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - frontend/node_modules
